name: Pull All Files to results/all-files
run-name: Pulling all files for ${{ github.ref_name }} by @${{ github.actor }}

on:
  schedule:
    - cron: '45 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  BUCKET_NAME: ${{ vars.BUCKET_NAME }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
  DEPLOYER_SA: ${{ vars.DEPLOYER_SA }}
  GCS_SOURCE_PREFIX: "structured/preds-llm"
  OUTPUT_DIR: "results/all-files"

jobs:
  pull_all_files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auth (WIF) and Setup gcloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Pull all run folders from GCS with same file names
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${{ env.OUTPUT_DIR }}"

          echo "Looking for run folders under gs://${BUCKET_NAME}/${GCS_SOURCE_PREFIX}/"
          RUN_DIRS=$(gsutil ls -d "gs://${BUCKET_NAME}/${GCS_SOURCE_PREFIX}/*/" || true)

          if [ -z "$RUN_DIRS" ]; then
            echo "No run folders found."
            exit 0
          fi

          while IFS= read -r RUN_DIR; do
            [ -z "$RUN_DIR" ] && continue

            RUN_ID=$(basename "$RUN_DIR")
            RUN_ID="${RUN_ID%/}"

            LOCAL_RUN_DIR="${{ env.OUTPUT_DIR }}/${RUN_ID}"
            mkdir -p "$LOCAL_RUN_DIR"

            echo "Copying all files from $RUN_DIR to $LOCAL_RUN_DIR"
            gsutil -m cp "${RUN_DIR}*" "$LOCAL_RUN_DIR/" || true
          done <<< "$RUN_DIRS"

          echo "Final files in ${{ env.OUTPUT_DIR }}:"
          find "${{ env.OUTPUT_DIR }}" -type f | sort || true

      - name: Commit and Push All Files
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add "${{ env.OUTPUT_DIR }}"

          git commit -m "🤖 Sync all run files from GCS to results/all-files" || echo "No changes to commit"

          git pull --rebase origin main
          git push
